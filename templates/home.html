<html>
    <body>
        <div class="login">
            <h1>Student Exam Performance Indicator</h1>

            <form action="{{url_for('predict_datapoint')}}" method="post">
                <h1>
                    <legend>Student Exam Performance Prediction</legend>
                </h1>
                <div class="mb-3">
                    <label for="gender" class="form-label">Gender</label>
                    <select name="gender" placeholder="Specify your gender" class="form-control" required>
                        <option selected disabled value="" class="placeholder">Select Your gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="ethnicity" class="form-label">Race or ethnicity</label>
                    <select name="ethnicity" placeholder="Enter you race or ethnicity" class="form-control" required>
                        <option class="placeholder" selected disabled value ="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="parental level of education" class="form-label">Parental Level of Education</label>
                    <select name="parental_level_of_education" placeholder="Enter your Parent Education" class="form-control" required>
                        <option class="placeholder" selected disabled value ="">Select Ethnicity</option>
                        <option value="associate's degree">associate's degree</option>
                        <option value="bachelor's degree">bachelor's degree</option>
                        <option value="high school">high school</option>
                        <option value="master's degree">master's degree</option>
                        <option value="some college">some college</option>
                        <option value="some high school">some high school</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="lunch" class="form-label">Lunch Type</label>
                    <select name="lunch" placeholder="Enter your Lunch" class="form-control" required>
                        <option class="placeholder" selected disabled value ="">Select Lunch Type</option>
                        <option value="free/reduced">free/reduced</option>
                        <option value="standard">standard</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="test_preparation_course" class="form-label">Test preparation Course</label>
                    <select name="test_preparation_course" placeholder="Enter your course" class="form-control" required>
                        <option class="placeholder" selected disabled value ="">Select Test_course</option>
                        <option value="none">None</option>
                        <option value="completed">completed</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="reading_score" class="form-label">Reading score out of 100</label>
                    <input name="reading_score" placeholder="Enter your reading score" class="form-control" type="number" min="0" max="100" />
                </div>
                <div class="mb-3">
                    <label for="writing_score" class="form-label">writing score out of 100</label>
                    <input name="writing_score" placeholder="Enter your writing score" class="form-control" type="number" min="0" max="100" />
                </div>
                <div class="mb-3">
                    <input class="btn btn-primary" type="submit" value="Predict your Maths Score" required />
                </div>
            </form>
            <h2>
                THE  prediction is {{results}}
            </h2>
        </div>
    </body>
</html>
